<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scan Result</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f7f7fa; }
        .container { margin-top: 50px; max-width: 600px; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 16px #bbb8; }
        h2 { font-weight: 700; }
        .result-msg { margin-bottom: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">Scan Result</h2>
        <div class="result-msg" th:utext="${result}"></div>
        <a href="/" class="btn btn-outline-secondary w-100">Go Back</a>
    </div>
</body>
</html>
