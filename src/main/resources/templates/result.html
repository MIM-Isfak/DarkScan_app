<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>DarkScan — Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 1.6rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            letter-spacing: 2px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-clean { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .dot-warning { background: #f85149; box-shadow: 0 0 8px #f85149; }
        .dot-error { background: #8b949e; }
        .subject {
            color: #8b949e;
            font-size: 0.78rem;
            word-break: break-all;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px solid #21262d;
        }
        .findings-label {
            color: #8b949e;
            font-size: 0.72rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .finding-item {
            background: #0d1117;
            border-left: 3px solid #f85149;
            border-radius: 0 6px 6px 0;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #c9d1d9;
        }
        .divider {
            border: none;
            border-top: 1px solid #21262d;
            margin: 24px 0;
        }
        .btn {
            display: block;
            width: 100%;
            background: transparent;
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 6px;
            padding: 11px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 1px;
            text-align: center;
            text-decoration: none;
            transition: box-shadow 0.2s, background 0.2s;
        }
        .btn:hover {
            background: rgba(0, 255, 136, 0.08);
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>[DarkScan]</h1>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
            <div th:if="${result.clean}" class="dot dot-clean"></div>
            <div th:if="${!result.clean and !result.error}" class="dot dot-warning"></div>
            <div th:if="${result.error}" class="dot dot-error"></div>
            <span th:text="${result.summary}"></span>
        </div>

        <!-- Subject (filename or URL) -->
        <div th:if="${result.subject}" class="subject"
             th:text="'target: ' + ${result.subject}"></div>

        <!-- Findings list -->
        <div th:if="${result.findings != null and !result.findings.isEmpty()}">
            <div class="findings-label">// findings</div>
            <div th:each="finding : ${result.findings}"
                 class="finding-item"
                 th:text="${finding}"></div>
        </div>

        <hr class="divider"/>
        <a href="/" class="btn">← New Scan</a>
    </div>
</body>
</html>
