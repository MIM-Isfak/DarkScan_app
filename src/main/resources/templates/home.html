<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>DarkScan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 2rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            letter-spacing: 2px;
        }
        .logo p {
            color: #8b949e;
            font-size: 0.8rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        label {
            display: block;
            color: #8b949e;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        select, input[type="text"], input[type="file"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 10px 14px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input[type="text"]:focus {
            border-color: #00ff88;
        }
        select option { background: #161b22; }
        .btn {
            width: 100%;
            background: #00ff88;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: box-shadow 0.2s, opacity 0.2s;
        }
        .btn:hover {
            box-shadow: 0 0 16px rgba(0, 255, 136, 0.4);
            opacity: 0.9;
        }
        .divider {
            border: none;
            border-top: 1px solid #21262d;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>[DarkScan]</h1>
            <p>security analysis tool</p>
        </div>

        <form method="post" action="/scan" enctype="multipart/form-data">
            <label for="scanType">// scan mode</label>
            <select name="scanType" id="scanType" onchange="toggleInput(this.value)">
                <option value="file">file_scan</option>
                <option value="website">web_scan</option>
            </select>

            <div id="fileInput">
                <label for="file">// select file</label>
                <input type="file" id="file" name="file"/>
            </div>

            <div id="urlInput" style="display:none;">
                <label for="inputValue">// target url</label>
                <input type="text" id="inputValue" name="inputValue" placeholder="https://example.com"/>
            </div>

            <hr class="divider"/>
            <button type="submit" class="btn">Run Scan →</button>
        </form>
    </div>

    <script>
        function toggleInput(val) {
            document.getElementById('fileInput').style.display = val === 'file' ? 'block' : 'none';
            document.getElementById('urlInput').style.display = val === 'website' ? 'block' : 'none';
        }
    </script>
</body>
</html>
